name: 3 Run Question Generator Report
# Reindexed for CV1NRM26Z70 deployment.

on:
  workflow_dispatch:  # allows manual trigger from Actions tab
#  push:
#    branches:
#      - master

permissions:
  contents: write
  actions: write

concurrency:
  group: stage-3-question-generator-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run-deepwiki:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium webdriver-manager
          pip install -r requirements.txt || echo "No requirements.txt found, skipping"


      - name: Check for question files
        id: check_questions
        run: |
          # Logic to check if there are files to process
          if [ -d scope_questions ] && find scope_questions -name '*.json' -print -quit | grep -q .; then
            echo "run_workflow=true" >> $GITHUB_OUTPUT
          else
            echo "No scope_questions/*.json input found"
            echo "run_workflow=false" >> $GITHUB_OUTPUT
          fi

      - name: Run Generate File
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}

        if: steps.check_questions.outputs.run_workflow == 'true'
        run: python run_questions_generator_report_generate.py


      - name: Run reports with virtual display
        if: steps.check_questions.outputs.run_workflow == 'true'
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          sudo apt-get install xclip
          xvfb-run --auto-servernum python -u run_questions_generator_report.py


      - name: Commit and push changes
        if: always() && steps.check_questions.outputs.run_workflow == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          if git diff --cached --quiet; then
            echo "No durable stage-3 progress to commit"
            exit 0
          fi
          git commit -m "Auto-update: collections and reports"
          # Retry logic
          n=0
          until [ $n -ge 3 ]; do
            git pull --rebase origin master
            if git push origin master; then
              echo "Push succeeded"
              break
            fi
            n=$((n+1))
            echo "Push failed, retrying in 5 seconds..."
            sleep 5
          done
          
          # Fail the step if all retries are exhausted
          if [ $n -eq 3 ]; then
          echo "Failed to push after 3 attempts"
          exit 1
          fi

      - name: Fail when there was no input
        if: steps.check_questions.outputs.run_workflow != 'true'
        run: |
          echo "Stage 3 requires at least one scope_questions/*.json input"
          exit 1
